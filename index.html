<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM Converter - Smooth Transition Edition</title>    
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>

        :root {

            --tomorrow-bg: #000b1a;

            --tomorrow-blue: #00d2ff;

            --tomorrow-deep: #004e92;

            --magic-gold: #ffd700;

            --neon-pink: #ff00de;

        }



        body {

            font-family: 'Noto Sans JP', sans-serif;

            background: radial-gradient(circle at center, var(--tomorrow-deep) 0%, var(--tomorrow-bg) 100%);

            margin: 0;

            display: flex;

            justify-content: center;

            padding: 20px;

            min-height: 100vh;

            color: white;

            overflow-x: hidden;

        }



        .container {

            background: rgba(0, 20, 40, 0.85);

            width: 100%;

            max-width: 450px;

            border-radius: 30px;

            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);

            padding: 30px;

            text-align: center;

            position: relative;

            backdrop-filter: blur(15px);

            border: 1px solid rgba(0, 210, 255, 0.3);

            z-index: 10;

        }



        h1 { 

            font-family: 'Orbitron', sans-serif;

            color: var(--tomorrow-blue);

            font-size: 1.6rem;

            letter-spacing: 4px;

            margin-bottom: 25px;

            text-shadow: 0 0 10px var(--tomorrow-blue);

        }



        .total-box {

            background: rgba(0, 210, 255, 0.1);

            border: 1px solid var(--tomorrow-blue);

            padding: 15px;

            border-radius: 15px;

            margin-bottom: 25px;

        }

        .total-value { 

            font-size: 2.2rem; 

            font-weight: bold; 

            font-family: 'Orbitron', sans-serif;

            text-shadow: 0 0 5px white;

        }



        .progress-section { text-align: left; margin-bottom: 20px; }

        .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 4px; color: var(--tomorrow-blue); font-weight: bold;}

        

        .progress-bar {

            height: 10px;

            background: rgba(255,255,255,0.1);

            border-radius: 5px;

            overflow: hidden;

            margin-bottom: 12px;

        }



        .fill {

            height: 100%;

            width: 0%;

            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);

            background-size: 200% 100%;

            animation: wave-animation 2s linear infinite;

            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);

        }

        

        @keyframes wave-animation {

            0% { background-position: 0% 0%; }

            100% { background-position: 200% 0%; }

        }



        .bar-default { background-image: linear-gradient(90deg, #0066cc, var(--tomorrow-blue), #0066cc); }

        .bar-dpa { background-image: linear-gradient(90deg, #9900cc, var(--neon-pink), #9900cc); }

        .bar-goods { background-image: linear-gradient(90deg, #00cc99, #00ffcc, #00cc99); }

        .bar-extra { background-image: linear-gradient(90deg, #ff9900, var(--magic-gold), #ff9900); }



        .message-box {

            min-height: 80px;

            background: rgba(0,0,0,0.3);

            border: 1px solid rgba(255, 215, 0, 0.3);

            border-radius: 10px;

            padding: 15px;

            margin: 20px 0;

            font-size: 0.9rem;

            color: #ddd;

            display: flex;

            align-items: center;

            justify-content: center;

        }



        #final-congrats {

            display: none;

            font-family: 'Orbitron', sans-serif;

            font-size: 1.8rem;

            color: var(--magic-gold);

            text-shadow: 0 0 20px var(--magic-gold);

            margin: 30px 0;

            animation: pulse 1.5s infinite;

        }



        @keyframes pulse {

            0% { transform: scale(1); opacity: 1; }

            50% { transform: scale(1.05); opacity: 0.8; }

            100% { transform: scale(1); opacity: 1; }

        }



        .btn-container {

            display: flex;

            gap: 10px;

            margin-bottom: 10px;

        }

        .btn-magic {

            flex: 1;

            background: var(--tomorrow-blue);

            color: #000b1a;

            border: none;

            padding: 18px 5px;

            border-radius: 10px;

            font-size: 0.9rem;

            font-weight: bold;

            font-family: 'Orbitron', sans-serif;

            cursor: pointer;

            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);

        }

        .btn-big { background: transparent; border: 2px solid var(--tomorrow-blue); color: var(--tomorrow-blue); }



        .settings-toggle { color: rgba(255,255,255,0.4); font-size: 0.75rem; cursor: pointer; margin-top: 15px; }

        .settings-panel { display: none; text-align: left; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }

        .setting-item input { width: 100%; margin-bottom: 8px; padding: 8px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px;}



        /* フェードアウト用のアニメーション設定 */

        #fireworks-canvas {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            pointer-events: none;

            z-index: 999;

            display: none;

            opacity: 1;

            transition: opacity 1s ease; /* スッと消えるための設定 */

        }

    </style>

</head>

<body>



<canvas id="fireworks-canvas"></canvas>



<div class="container">

    <h1>DREAM Converter</h1>



    <div class="total-box">

        <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.7;">TOTAL ENERGY SAVED</div>

        <div class="total-value">¥<span id="display-total">0</span></div>

    </div>



    <div class="progress-section">

        <div class="progress-label"><span>🎟 Ticket</span><span id="label-park">0</span></div>

        <div class="progress-bar"><div id="bar-park" class="fill bar-default"></div></div>



        <div class="progress-label"><span>🏨 Hotel</span><span id="label-hotel">0</span></div>

        <div class="progress-bar"><div id="bar-hotel" class="fill bar-default" style="opacity:0.8"></div></div>



        <div class="progress-label"><span>🍕 Food</span><span id="label-food">0</span></div>

        <div class="progress-bar"><div id="bar-food" class="fill bar-default" style="opacity:0.6"></div></div>



        <div class="progress-label"><span>✨ DPA</span><span id="label-dpa">0</span></div>

        <div class="progress-bar"><div id="bar-dpa" class="fill bar-dpa"></div></div>



        <div class="progress-label"><span>🛍 Goods</span><span id="label-goods">0</span></div>

        <div class="progress-bar"><div id="bar-goods" class="fill bar-goods"></div></div>



        <div class="progress-label"><span>🌊 Extra</span><span id="label-extra">0</span></div>

        <div class="progress-bar"><div id="bar-extra" class="fill bar-extra"></div></div>

    </div>



    <div class="message-box">

        <div id="quote-text">Awaiting your command...</div>

    </div>



    <div id="final-congrats">CONGRATULATION！</div>



    <div class="btn-container" id="magic-controls">

        <button class="btn-magic" onclick="doMagic('small')">SMALL MAGIC</button>

        <button class="btn-magic btn-big"  onclick="doMagic('big')">BIG MAGIC</button>

    </div>



    <div class="settings-toggle" onclick="toggleSettings()">SYSTEM SETTINGS</div>

    <div id="settings-panel" class="settings-panel">

        <div style="font-weight:bold; margin-bottom:10px; font-size:0.8rem; color:var(--tomorrow-blue)">[ Button Amounts ]</div>

        <div class="setting-item">Small: <input type="number" id="set-btn-small" value="500"></div>

        <div class="setting-item">Big: <input type="number" id="set-btn-big" value="2000"></div>

        

        <div style="font-weight:bold; margin-bottom:10px; font-size:0.8rem; color:var(--tomorrow-blue); margin-top:10px;">[ Goal Thresholds ]</div>

        <div class="setting-item">Ticket: <input type="number" id="set-park" value="10900"></div>

        <div class="setting-item">Hotel: <input type="number" id="set-hotel" value="70000"></div>

        <div class="setting-item">Food: <input type="number" id="set-food" value="15000"></div>

        <div class="setting-item">DPA: <input type="number" id="set-dpa" value="6000"></div>

        <div class="setting-item">Goods: <input type="number" id="set-goods" value="20000"></div>

        <div class="setting-item">Extra: <input type="number" id="set-extra" value="10000"></div>

        <button onclick="updateSettings()" style="width:100%; padding:12px; background:var(--tomorrow-blue); border:none; font-weight:bold; cursor:pointer; border-radius:5px;">SAVE CHANGES</button>

        <button onclick="resetData()" style="width:100%; background:none; color:rgba(255,100,100,0.8); border:none; margin-top:15px; font-size:0.7rem; cursor:pointer;">FACTORY RESET</button>

    </div>

</div>



<script>

    const quotes = [

        "夢を求め続ける勇気さえあれば、すべての夢は必ず実現できる。", "逆境の中で咲く花は、どの花よりも貴重で美しい。", "信じていれば、夢は叶う。", "君は自分が思っているより勇敢で、強くて、賢いんだ。", "前へ進み続けよう。新しい扉を開き、新しいことをしよう。", "過去は痛むかもしれない。でも、逃げるか学ぶかだ。", "何事も、考え方次第で楽しくなるわ。", "一歩踏み出す勇気があれば、世界は変わる。", "自分の夢を追いかけるのを忘れないで。", "真のヒーローは、心の強さで決まる。", "笑い声は時代を超え、想像力は年を取らない。", "信じること、そして妖精の粉。", "不可能なことなどないわ。", "自分の道を見つけるのは自分自身だ。", "たとえ心が悲しくても、信じ続ければ夢はかなう。", "成功する秘訣は、始めることだ。", "私の夢は私の夢で終わらせない。", "無限の彼方へ、さあ行くぞ！", "誰でも、何にでもなれる。", "自分を信じれば、空だって飛べる。", "好奇心、自信、勇気、そして継続。", "正しい道は、いつも簡単な道とは限らない。", "夢はひそかに。", "幸せは心の持ちようである。", "ただ泳ぎ続けるんだ。", "私はいつでもあなたのそばにいます。", "すべては一匹のねずみから始まった。", "真実の美しさは、心の中にある。", "愛はどんな力よりも強い。", "我々の最大の弱点は、諦めてしまうことだ。"

    ];



    let state = JSON.parse(localStorage.getItem('disney_conv_final')) || {

        total: 0,

        btnSmall: 500,

        btnBig: 2000,

        goals: { park: 10900, hotel: 70000, food: 15000, dpa: 6000, goods: 20000, extra: 10000 }

    };



    function updateUI() {

        document.getElementById('display-total').innerText = state.total.toLocaleString();

        let remaining = state.total;

        const cats = [

            {id:'park', g:state.goals.park}, {id:'hotel', g:state.goals.hotel},

            {id:'food', g:state.goals.food}, {id:'dpa', g:state.goals.dpa},

            {id:'goods', g:state.goals.goods}, {id:'extra', g:state.goals.extra}

        ];



        let totalGoalSum = 0;

        cats.forEach(c => {

            const current = Math.min(remaining, c.g);

            const p = c.g > 0 ? (current / c.g) * 100 : 0;

            document.getElementById(`bar-${c.id}`).style.width = p + '%';

            document.getElementById(`label-${c.id}`).innerText = `¥${current.toLocaleString()}`;

            remaining = Math.max(0, remaining - c.g);

            totalGoalSum += c.g;

        });



        if (state.total >= totalGoalSum && totalGoalSum > 0) {

            document.getElementById('magic-controls').style.display = 'none';

            document.getElementById('final-congrats').style.display = 'block';

        } else {

            document.getElementById('magic-controls').style.display = 'flex';

            document.getElementById('final-congrats').style.display = 'none';

        }



        document.getElementById('btn-small-text').innerText = `SMALL (¥${state.btnSmall})`;

        document.getElementById('btn-big-text').innerText = `BIG (¥${state.btnBig})`;

        localStorage.setItem('disney_conv_final', JSON.stringify(state));

    }



    function doMagic(type) {

        const amt = type === 'small' ? state.btnSmall : state.btnBig;

        state.total += amt;

        document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random()*quotes.length)];

        

        const fireworkThreshold = state.goals.park + state.goals.hotel + state.goals.food + state.goals.dpa;

        if (state.total >= fireworkThreshold && (state.total - amt) < fireworkThreshold) {

            startFireworks();

        }

        updateUI();

    }



    function updateSettings() {

        state.btnSmall = Number(document.getElementById('set-btn-small').value);

        state.btnBig = Number(document.getElementById('set-btn-big').value);

        state.goals.park = Number(document.getElementById('set-park').value);

        state.goals.hotel = Number(document.getElementById('set-hotel').value);

        state.goals.food = Number(document.getElementById('set-food').value);

        state.goals.dpa = Number(document.getElementById('set-dpa').value);

        state.goals.goods = Number(document.getElementById('set-goods').value);

        state.goals.extra = Number(document.getElementById('set-extra').value);

        updateUI();

        toggleSettings();

    }



    function toggleSettings() {

        const p = document.getElementById('settings-panel');

        p.style.display = p.style.display === 'block' ? 'none' : 'block';

    }



    function resetData() { 

        if(confirm("設定をクリアしますか？")) { 

            state.total = 0; 

            updateUI(); 

        } 

    }



    // --- 花火・演出エンジン ---

    const canvas = document.getElementById('fireworks-canvas');

    const ctx = canvas.getContext('2d');

    let particles = [];



    function startFireworks() {

        canvas.style.display = 'block';

        canvas.style.opacity = '1'; // 表示時に透明度を1にする

        const duration = 5000;

        const endTime = Date.now() + duration;

        

        function loop() {

            if (Date.now() < endTime) {

                if (Math.random() < 0.2) createBurst();

                if (Math.random() < 0.15) createSidePyro();

                draw();

                requestAnimationFrame(loop);

            } else {

                // スッと消えるアニメーション開始

                canvas.style.opacity = '0';

                setTimeout(() => {

                    canvas.style.display = 'none';

                    particles = [];

                }, 1000); // CSSのtransition(1s)と合わせる

            }

        }

        loop();

    }



    function createSidePyro() {

        const side = Math.random() < 0.5 ? 'left' : 'right';

        const x = side === 'left' ? 0 : canvas.width;

        const y = canvas.height;

        const vx = side === 'left' ? (Math.random() * 8 + 5) : -(Math.random() * 8 + 5);

        const vy = -(Math.random() * 12 + 10);

        const hue = Math.random() < 0.5 ? 45 : 200;



        for(let i=0; i<3; i++) {

            particles.push({

                x, y, vx: vx + (Math.random()-0.5), vy: vy + (Math.random()-0.5),

                r: 4, color: `hsl(${hue}, 100%, 70%)`, alpha: 1, decay: 0.015, isPyro: true

            });

        }

    }



    function createBurst() {

        const x = Math.random() * canvas.width;

        const y = Math.random() * canvas.height * 0.7;

        const hue = Math.random() * 360;

        for (let i = 0; i < 80; i++) {

            particles.push({

                x, y, vx: (Math.random() - 0.5) * 14, vy: (Math.random() - 0.5) * 14,

                r: Math.random() * 2 + 1, color: `hsl(${hue + (Math.random()*40 - 20)}, 100%, 60%)`,

                alpha: 1, decay: Math.random() * 0.02 + 0.01, isPyro: false

            });

        }

    }



    function draw() {

        ctx.fillStyle = 'rgba(0, 11, 26, 0.25)';

        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p, i) => {

            p.x += p.vx; p.y += p.vy;

            p.vy += p.isPyro ? 0.25 : 0.15;

            p.alpha -= p.decay;

            ctx.globalAlpha = p.alpha;

            ctx.shadowBlur = p.isPyro ? 15 : 0;

            ctx.shadowColor = p.color;

            ctx.fillStyle = p.color;

            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();

            if (p.alpha <= 0) particles.splice(i, 1);

        });

        ctx.shadowBlur = 0;

    }



    window.addEventListener('resize', () => {

        canvas.width = window.innerWidth;

        canvas.height = window.innerHeight;

    });

    canvas.width = window.innerWidth;

    canvas.height = window.innerHeight;



    updateUI();

</script>

</body>

</html>
