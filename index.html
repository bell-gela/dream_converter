<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DREAM Converter</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tomorrow-bg: #000b1a;
            --tomorrow-blue: #00d2ff;
            --tomorrow-deep: #004e92;
            --magic-gold: #ffd700;
            --neon-pink: #ff00de;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at center, var(--tomorrow-deep) 0%, var(--tomorrow-bg) 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            /* タップ時のズームと選択を防止 */
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            background: rgba(0, 20, 40, 0.85);
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            padding: 30px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            z-index: 10;
            box-sizing: border-box;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: var(--tomorrow-blue);
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px var(--tomorrow-blue);
        }

        .total-box {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--tomorrow-blue);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .total-value { 
            font-size: 2rem; 
            font-weight: bold; 
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 5px white;
        }

        .progress-section { text-align: left; margin-bottom: 20px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 4px; color: var(--tomorrow-blue); font-weight: bold;}
        
        .progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            background-size: 200% 100%;
            animation: wave-animation 2s linear infinite;
        }
        
        @keyframes wave-animation {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .bar-default { background-image: linear-gradient(90deg, #0066cc, var(--tomorrow-blue), #0066cc); }
        .bar-dpa { background-image: linear-gradient(90deg, #9900cc, var(--neon-pink), #9900cc); }
        .bar-goods { background-image: linear-gradient(90deg, #00cc99, #00ffcc, #00cc99); }
        .bar-extra { background-image: linear-gradient(90deg, #ff9900, var(--magic-gold), #ff9900); }

        .message-box {
            min-height: 80px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.85rem;
            color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            line-height: 1.4;
        }

        #final-congrats {
            display: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            color: var(--magic-gold);
            text-shadow: 0 0 20px var(--magic-gold);
            margin: 30px 0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn-magic {
            flex: 1;
            background: var(--tomorrow-blue);
            color: #000b1a;
            border: none;
            padding: 18px 5px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            touch-action: manipulation;
            -webkit-appearance: none;
        }
        .btn-big { background: transparent; border: 2px solid var(--tomorrow-blue); color: var(--tomorrow-blue); }

        .settings-toggle { color: rgba(255,255,255,0.4); font-size: 0.75rem; cursor: pointer; margin-top: 15px; padding: 10px; }
        .settings-panel { display: none; text-align: left; padding: 20px; background: rgba(0,0,0,0.9); border-radius: 20px; margin-top: 10px; border: 1px solid rgba(0, 210, 255, 0.5); }
        
        /* ズーム防止のためにフォントサイズを16pxに固定 */
        .setting-item label { font-size: 0.75rem; color: var(--tomorrow-blue); display: block; margin-bottom: 4px; }
        .setting-item input { 
            width: 100%; 
            margin-bottom: 12px; 
            padding: 12px; 
            background: #000; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 8px;
            font-size: 16px; 
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: var(--tomorrow-blue);
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            font-size: 16px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
